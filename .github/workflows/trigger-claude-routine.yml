name: Trigger Claude routine

on:
    push:
        branches: [main]

jobs:
    trigger:
        runs-on: ubuntu-latest
        # Don't re-fire the audit when a workflow-audit PR is merged into main — that push
        # is the audit's own work coming back, and reviewing it again would loop. A merge
        # commit reads "Merge pull request … from …/workflow-audit/…".
        if: ${{ !contains(github.event.head_commit.message, 'workflow-audit/') }}
        steps:
            - name: Fire routine
              env:
                  ROUTINE_TOKEN: ${{ secrets.CLAUDE_ROUTINE_TRIGGER_TOKEN }}
                  # Passed via env (not inline ${{ }}) so values can't break the shell.
                  GH_REPO: ${{ github.repository }}
                  GH_REF: ${{ github.ref_name }}
                  GH_SHA: ${{ github.sha }}
                  GH_ACTOR: ${{ github.actor }}
                  # SHA of main BEFORE this push, so the routine can review the exact range.
                  GH_BEFORE: ${{ github.event.before }}
              run: |
                  TEXT="Review the push to ${GH_REF} in ${GH_REPO}: diff range ${GH_BEFORE}..${GH_SHA} (pushed by ${GH_ACTOR})."
                  curl --fail-with-body -sS -X POST \
                    "https://api.anthropic.com/v1/claude_code/routines/trig_01YFSc7zHT2Nv8z4r8f4KQL4/fire" \
                    -H "Authorization: Bearer $ROUTINE_TOKEN" \
                    -H "anthropic-version: 2023-06-01" \
                    -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
                    -H "Content-Type: application/json" \
                    -d "{\"text\": \"$TEXT\"}"
