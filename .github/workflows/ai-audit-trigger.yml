name: AI Audit Trigger

# The claude-code-action can't run on the `push` event, so this tiny workflow bridges it:
# on every push to main it re-dispatches ai-audit.yml (workflow_dispatch) with the pushed
# commit range. It uses AUDIT_PR_TOKEN because a workflow_dispatch from the default
# GITHUB_TOKEN does not create a new run (GitHub anti-recursion). The PAT therefore needs
# `Actions: write` in addition to Contents/Pull requests.

on:
    push:
        branches: [main]

jobs:
    dispatch:
        # Don't re-audit the audit's own merges/bot pushes (its squash/merge commit subject
        # starts with "AI Audit:"). A genuine human change to main still dispatches an audit.
        if: >-
            github.actor != 'github-actions[bot]' &&
            !startsWith(github.event.head_commit.message, 'AI Audit:')
        runs-on: ubuntu-latest
        steps:
            - name: Dispatch AI Audit
              env:
                  GH_TOKEN: ${{ secrets.AUDIT_PR_TOKEN }}
              run: |
                  gh workflow run ai-audit.yml \
                    --repo "${{ github.repository }}" \
                    --ref main \
                    -f base="${{ github.event.before }}" \
                    -f head="${{ github.sha }}"
