# Local-only Postgres for development. Production uses DigitalOcean Managed Postgres
# (provisioned via .do/app.yaml). Schema + migrations live under prisma/.
#
# Bring up:  `pnpm db:up`   (alias for docker compose up -d, run from apps/api)
# Tear down: `pnpm db:down`
# Connect:   `psql postgresql://offertum:offertum@localhost:5432/offertum`

services:
    postgres:
        image: postgres:16-alpine
        container_name: offertum-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: offertum
            POSTGRES_PASSWORD: offertum
            POSTGRES_DB: offertum
        ports:
            - '5432:5432'
        volumes:
            - offertum-pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U offertum -d offertum']
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    offertum-pgdata:
