services:
    postgres:
        image: postgres:16-alpine
        container_name: offertum-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: offertum
            POSTGRES_PASSWORD: offertum
            POSTGRES_DB: offertum
        ports:
            - '5432:5432'
        volumes:
            - offertum-postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U offertum -d offertum']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    offertum-postgres-data:
